  pre_computation_required: true
  pre_computation_time_minutes: 32

ai_tools_declaration:
  ai_tools_used: ["Antigravity Agent (Google DeepMind)", "GitHub Copilot"]
  ai_usage_summary: |
    - Used Antigravity Agent for architecture design, deterministic pipeline implementation, code review, UI creation, and orchestration.
    - Used GitHub Copilot for autocomplete and boilerplate generation during development.
    - NO candidate data sent to any LLM during the offline or online pipeline.
    - All candidate ranking and reasoning is strictly computed locally via heuristic rule-engines and local `all-MiniLM-L6-v2` cosine similarities.

methodology_summary: |
  Hybrid semantic + rule-based ranker combining deterministic heuristic adjustments with dense vector cosine similarity. We split the pipeline strictly into an offline precomputation phase with `sentence-transformers` capturing text features for all 100K candidates, and an online evaluation phase. The online phase scores candidates across 7 structured dimensions: Experience (years), Role Match, Skills, Domain, Location, Education, and Activity Status. Honeypot detection flags impossible profiles and penalizes them below the threshold. Our deterministic architecture generates the textual explanations natively, guaranteeing 100% precision with no LLM hallucination. Runtime: ~19 seconds on CPU, well within the 5-minute constraint.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
